<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estates</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    .copy-icon {
    margin-left: 10px;
    cursor: pointer;
    font-size: 1.2em;
    color: #ffffff; /* Blue color for the icon */
}

.copy-text {
    margin-left: 5px;
    color: #000000; /* Matching color for the text */
    cursor: pointer;
}

</style>
</head>



<body>
    <div class="p-2 scroll-padding-list">
        <ul class="list-group">
            <li class="list-group-item list-group-item-primary">
                <strong>1.</strong>240 Mercer St, New York, NY 10012, USA
                <i class="fa fa-copy copy-icon" aria-hidden="true"></i>
                <span class="copy-text">Copy</span>
            </li>
            <li class="list-group-item list-group-item-secondary">
                <strong>2.</strong>610 E 20th St, New York, NY 10009, USA
                <i class="fa fa-copy copy-icon" aria-hidden="true"></i>
                <span class="copy-text">Copy</span>
            </li>
            <!-- Repeat for the rest of the items -->
        </ul>
    </div>
    

    <script>
       const copyIcons = document.querySelectorAll('.copy-icon');

// Function to copy the address text to clipboard
function copyToClipboard(text) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
}

// Add click event listeners to each copy icon and text
copyIcons.forEach((icon) => {
    icon.addEventListener('click', function() {
        // Get only the address text, ignoring the icon and "Copy" text
        const textToCopy = icon.closest('li').querySelector('strong').nextSibling.textContent.trim();
        copyToClipboard(textToCopy);
        alert('Copied: ' + textToCopy); // Optional: alert to show the copied text
    });
});




    </script>
</body>

</html>
