function drawPolygons() {
    polygons.forEach(polygonData => {
        const polygon = new google.maps.Polygon({
            paths: polygonData.paths,
            strokeColor: polygonData.color,
            strokeOpacity: 0.8,
            strokeWeight: 2,
            fillColor: polygonData.color,
            fillOpacity: 0.35
        });
        polygon.setMap(map);
    });
}

function initMap() {
    const mapOptions = {
        center: { lat: 40.7580, lng: -73.9855 },
        zoom: 10,
    };
    map = new google.maps.Map(document.getElementById('map'), mapOptions);
    infoWindow = new google.maps.InfoWindow();
    
    showMarkers(properties);
    drawPolygons();
}
    function updateCities() {
        const countrySelect = document.getElementById('country').value;
        const citySelect = document.getElementById('city');
        citySelect.innerHTML = '<option value="">--Please choose an option--</option>'; // Reset cities

        if (cityMap[countrySelect]) {
            cityMap[countrySelect].forEach(city => {
                const option = document.createElement('option');
                option.value = city;
                option.textContent = city;
                citySelect.appendChild(option);
            });
        }
    }

    function filterProperties() {
            const countrySelect = document.getElementById('country').value;
            const citySelect = document.getElementById('city').value;

            const filteredProperties = properties.filter(prop => {
                return (!countrySelect || prop.address.countryName === countrySelect) &&
                    (!citySelect || prop.address.city === citySelect);
            });

            // Update the map and show markers for the filtered properties
            showMarkers(filteredProperties);

            // Zoom to the selected city
            if (citySelect) {
                const cityCoordinates = filteredProperties.length > 0 ? filteredProperties[0].address : { latitude: 40.7580, longitude: -73.9855 };
                map.setCenter({ lat: cityCoordinates.latitude, lng: cityCoordinates.longitude });
                map.setZoom(12);
            }
        }

    function displayProperties(properties) {
            const col_class_innertext = document.querySelector('.card_arrange_row');
            col_class_innertext.innerHTML = "";
            if (properties.length > 0) {
                properties.forEach(dataemp => {
                    const htmlSegment = `
                        <div class="property-card">
                            <h3>${dataemp.title}</h3>
                            <p>${dataemp.description}</p>
                            <p>Floor Area: ${dataemp.floorArea}</p>
                            <p>Rooms: ${dataemp.room}</p>
                        </div>`;
                    col_class_innertext.innerHTML += htmlSegment;
                });
                document.getElementById("recorder_btn").style.display = "none";
            } else {
                document.getElementById("recorder_btn").style.display = "block";
                col_class_innertext.innerHTML = "";
            }
        }

        function showMarkers(properties) {
    // Clear existing markers
    markers.forEach(marker => marker.setMap(null));
    markers = [];

    // Create bounds object for fitting the map
    const bounds = new google.maps.LatLngBounds();
    console.log("bounds showmaker fun ",bounds)
    properties.forEach(prop => {
        const position = { lat: prop.address.latitude, lng: prop.address.longitude };
        const marker = new google.maps.Marker({
            position: position,
            map: map,
            title: prop.title,
        });

        // Add click event to show info window
        google.maps.event.addListener(marker, 'click', function() {
            infoWindow.setContent(`<div><strong>${prop.title}</strong><br>${prop.description}</div>`);
            infoWindow.open(map, marker);
        });

        markers.push(marker);
        bounds.extend(position); // Extend bounds to include this marker
        console.log(" bounds.extend(position);  ", bounds.extend(position))
    });

    // Fit the map to the markers
    if (markers.length > 0) {
        map.fitBounds(bounds);
    } else {
        // Optionally, reset the map to a default view if no markers are available
        map.setCenter({ lat: 40.7580, lng: -73.9855 });
        map.setZoom(10);
    }
}
function loadScript() {

        script.async = true; // Load the script asynchronously
        script.defer = true; // Defer execution
        document.body.appendChild(script);
    }
