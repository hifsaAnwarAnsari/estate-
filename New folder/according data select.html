<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Search</title>
    <style>
        .map-container {
            height: 500px;
            width: 100%;
        }

        .property-card {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <label for="country">Select Country:</label>
    <select id="country" onchange="updateCities()">
        <option value="">--Please choose an option--</option>
        <option value="USA">USA</option>
        <option value="Indonesia">Indonesia</option>
        <option value="Canada">Canada</option>
    </select>

    <label for="city">Select City:</label>
    <select id="city" onchange="updatePropertyOptions()">
        <option value="">--Please choose an option--</option>
    </select>

    <label for="rooms">Rooms:</label>
    <select id="rooms">
        <option value="">--Please choose an option--</option>
    </select>

    <label for="floorArea">Floor Area:</label>
    <select id="floorArea">
        <option value="">--Please choose an option--</option>
    </select>

    <label for="type">Type:</label>
    <select id="type">
        <option value="">--Please choose an option--</option>
    </select>

    <label for="propertyType">Property Type:</label>
    <select id="propertyType">
        <option value="">--Please choose an option--</option>
    </select>

    <label for="furnished">Furnished Category:</label>
    <select id="furnished">
        <option value="">--Please choose an option--</option>
    </select>

    <div class="map_sec">
        <div id="map" class="map-container"></div>
    </div>

    <div class="container">
        <div class="card_arrange_row row"></div>
    </div>

    <div class="records text-center">
        <span class="recorder_btn" id="recorder_btn"> No records </span>
    </div>

    <button onclick="filterProperties()">Search</button>

    <script>
        const properties = [
            {
                id: 1,
                title: "Modern Loft in New York City",
                type: "sale",
                propertystatus: "apartment",
                room: "2",
                address: {
                    street: "123 West 45th Street",
                    neighborhood: "Midtown",
                    city: "New York",
                    zipCode: "10036",
                    stateName: "New York",
                    countryName: "USA",
                    latitude: 40.7580,
                    longitude: -73.9855
                },
                description: "A stylish loft with high ceilings and panoramic city views.",
                floorArea: "95 square metres",
                furnishing: "Furnished",
            },
            {
                id: 2,
                title: "Beachfront Villa in Bali",
                type: "rent",
                propertystatus: "house",
                room: "4",
                address: {
                    street: "Jalan Pantai",
                    neighborhood: "Seminyak",
                    city: "Bali",
                    countryName: "Indonesia",
                    latitude: -8.6875,
                    longitude: 115.1682
                },
                description: "A stunning beachfront villa with private access to the beach, ideal for relaxation.",
                floorArea: "300 square metres",
                furnishing: "Fully furnished",
            },
        ];

        const cityMap = {
            USA: ["New York"],
            Indonesia: ["Bali"],
            Canada: ["Toronto"],
        };

        const propertyOptions = {
            "New York": {
                rooms: ["2"],
                floorArea: ["50 square metres", "95 square metres"],
                type: ["sale"],
                propertyType: ["apartment"],
                furnished: ["Furnished"],
            },
            Bali: {
                rooms: ["4"],
                floorArea: ["300 square metres"],
                type: ["rent"],
                propertyType: ["house"],
                furnished: ["Fully furnished"],
            }
        };

        let map;
        let markers = [];

        function initMap() {
            const mapOptions = {
                center: { lat: 40.7580, lng: -73.9855 },
                zoom: 10,
            };
            map = new google.maps.Map(document.getElementById('map'), mapOptions);
        }

        function updateCities() {
            const countrySelect = document.getElementById('country').value;
            const citySelect = document.getElementById('city');
            citySelect.innerHTML = '<option value="">--Please choose an option--</option>'; // Reset cities

            if (cityMap[countrySelect]) {
                cityMap[countrySelect].forEach(city => {
                    const option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    citySelect.appendChild(option);
                });
            }

            // Reset other dropdowns
            resetPropertyOptions();
        }

        function resetPropertyOptions() {
            document.getElementById('rooms').innerHTML = '<option value="">--Please choose an option--</option>';
            document.getElementById('floorArea').innerHTML = '<option value="">--Please choose an option--</option>';
            document.getElementById('type').innerHTML = '<option value="">--Please choose an option--</option>';
            document.getElementById('propertyType').innerHTML = '<option value="">--Please choose an option--</option>';
            document.getElementById('furnished').innerHTML = '<option value="">--Please choose an option--</option>';
        }

        function updatePropertyOptions() {
            const citySelect = document.getElementById('city').value;
            const roomsSelect = document.getElementById('rooms');
            const floorAreaSelect = document.getElementById('floorArea');
            const typeSelect = document.getElementById('type');
            const propertyTypeSelect = document.getElementById('propertyType');
            const furnishedSelect = document.getElementById('furnished');

            resetPropertyOptions();

            if (propertyOptions[citySelect]) {
                propertyOptions[citySelect].rooms.forEach(room => {
                    const option = document.createElement('option');
                    option.value = room;
                    option.textContent = room;
                    roomsSelect.appendChild(option);
                });

                propertyOptions[citySelect].floorArea.forEach(area => {
                    const option = document.createElement('option');
                    option.value = area;
                    option.textContent = area;
                    floorAreaSelect.appendChild(option);
                });

                propertyOptions[citySelect].type.forEach(type => {
                    const option = document.createElement('option');
                    option.value = type;
                    option.textContent = type.charAt(0).toUpperCase() + type.slice(1);
                    typeSelect.appendChild(option);
                });

                propertyOptions[citySelect].propertyType.forEach(propertyType => {
                    const option = document.createElement('option');
                    option.value = propertyType;
                    option.textContent = propertyType.charAt(0).toUpperCase() + propertyType.slice(1);
                    propertyTypeSelect.appendChild(option);
                });

                propertyOptions[citySelect].furnished.forEach(furnishing => {
                    const option = document.createElement('option');
                    option.value = furnishing;
                    option.textContent = furnishing;
                    furnishedSelect.appendChild(option);
                });
            }
        }

        function filterProperties() {
            const countrySelect = document.getElementById('country').value;
            const citySelect = document.getElementById('city').value;
            const roomSelect = document.getElementById('rooms').value;
            const floorAreaSelect = document.getElementById('floorArea').value;
            const typeSelect = document.getElementById('type').value;
            const propertyTypeSelect = document.getElementById('propertyType').value;
            const furnishedSelect = document.getElementById('furnished').value;

            const filteredProperties = properties.filter(prop => {
                return (!countrySelect || prop.address.countryName === countrySelect) &&
                    (!citySelect || prop.address.city === citySelect) &&
                    (!roomSelect || prop.room === roomSelect) &&
                    (!floorAreaSelect || prop.floorArea === floorAreaSelect) &&
                    (!typeSelect || prop.type === typeSelect) &&
                    (!propertyTypeSelect || prop.propertystatus === propertyTypeSelect) &&
                    (!furnishedSelect || prop.furnishing === furnishedSelect);
            });

            displayProperties(filteredProperties);
            showMarkers(filteredProperties);
        }

        function displayProperties(properties) {
            const col_class_innertext = document.querySelector('.card_arrange_row');
            col_class_innertext.innerHTML = "";
            if (properties.length > 0) {
                properties.forEach(dataemp => {
                    const htmlSegment = `
                        <div class="property-card">
                            <h3>${dataemp.title}</h3>
                            <p>${dataemp.description}</p>
                            <p>Floor Area: ${dataemp.floorArea}</p>
                            <p>Rooms: ${dataemp.room}</p>
                        </div>`;
                    col_class_innertext.innerHTML += htmlSegment;
                });
                document.getElementById("recorder_btn").style.display = "none";
            } else {
                document.getElementById("recorder_btn").style.display = "block";
                col_class_innertext.innerHTML = "";
            }
        }

        function showMarkers(properties) {
            markers.forEach(marker => marker.setMap(null));
            markers = [];

            properties.forEach(prop => {
                const marker = new google.maps.Marker({
                    position: { lat: prop.address.latitude, lng: prop.address.longitude },
                    map: map,
                    title: prop.title
                });
                markers.push(marker);
            });

            if (markers.length > 0) {
                const bounds = new google.maps.LatLngBounds();
                markers.forEach(marker => bounds.extend(marker.position));
                map.fitBounds(bounds);
            }
        }

        function loadScript() {
            const script = document.createElement("script");
            script.src = "https://maps.googleapis.com/maps/api/js?key=AIzaSyAVJiRDZsecoVecl0fiq2xHchQdWihXr3k&callback=initMap";
            script.async = true; // Load the script asynchronously
            script.defer = true; // Defer execution
            document.body.appendChild(script);
        }

        window.onload = loadScript;
    </script>
</body>

</html>
