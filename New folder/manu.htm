<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Is Our Life - Eco-Friendly Homes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <style>
        body, html {
            height: 100%;
            background: #FFD700;
        }
        .navbar {
            background-color: transparent !important;
            padding-top: 1.5rem;
            padding-bottom: 1.5rem;
        }
        .navbar-brand {
            font-weight: bold;
            color: #FFD700 !important;
            font-size: 1.5rem;
        }
        .nav-link {
            color: #FFFFFF !important;
            margin-left: 1rem;
            font-weight: 500;
        }
       
        .offcanvas {
            background-color: #1a1a1a;
            transition: transform 0.3s ease-in-out;
        }
        .offcanvas-header {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .offcanvas-title {
            color: #FFD700;
            font-weight: bold;
            font-size: 2rem;
        }
        .offcanvas-body {
            padding: 1.5rem;
        }
        .offcanvas .nav-link {
            color: #FFFFFF !important;
            font-size: 1.2rem;
            padding: 1rem 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }
        .offcanvas .nav-link:hover {
            color: #FFD700 !important;
            transform: translateX(10px);
        }
        .offcanvas .nav-link i {
            margin-right: 1rem;
            font-size: 1.4rem;
        }
        .offcanvas .btn-see-more {
            margin-top: 2rem;
            width: 100%;
            text-align: center;
            transition: all 0.3s ease;
        }
        .offcanvas .btn-see-more:hover {
            background-color: #FFD700;
            color: #1a1a1a;
        }
        .offcanvas-footer {
            padding: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
      
        .menu-icon {
            width: 30px;
            height: 20px;
            position: relative;
            cursor: pointer;
        }
        .menu-icon span {
            display: block;
            position: absolute;
            height: 3px;
            width: 100%;
            background: #FFFFFF;
            border-radius: 3px;
            transition: all 0.3s ease;
        }
        .menu-icon span:nth-child(1) { top: 0px; }
        .menu-icon span:nth-child(2) { top: 8px; }
        .menu-icon span:nth-child(3) { top: 16px; }
        .menu-icon.active span:nth-child(1) {
            transform: rotate(45deg);
            top: 8px;
        }
        .menu-icon.active span:nth-child(2) {
            width: 0%;
            opacity: 0;
        }
        .menu-icon.active span:nth-child(3) {
            transform: rotate(-45deg);
            top: 8px;
        }
        @media (max-width: 768px) {
            
            .navbar {
                background-color: rgba(0, 0, 0, 0.5) !important;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">Solar</a>
            <div class="menu-icon d-lg-none" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Solutions</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Design</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Blog</a></li>
                    <li class="nav-item"><a class="btn btn-see-more ms-3" href="#">See more</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Solar</h5>
            <div class="menu-icon active" data-bs-dismiss="offcanvas">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        <div class="offcanvas-body">
            <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-lightning-charge-fill"></i>Solutions</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-building"></i>Projects</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-palette"></i>Design</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-journal-text"></i>Blog</a></li>
            </ul>
            <a class="btn btn-see-more" href="#">See more</a>
        </div>
        <div class="offcanvas-footer">
            <div class="social-icons">
                <a href="#"><i class="bi bi-facebook"></i></a>
                <a href="#"><i class="bi bi-twitter"></i></a>
                <a href="#"><i class="bi bi-instagram"></i></a>
                <a href="#"><i class="bi bi-linkedin"></i></a>
            </div>
        </div>
    </div>

   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
       

        document.querySelectorAll('.menu-icon').forEach(icon => {
            icon.addEventListener('click', function() {
                this.classList.toggle('active');
            });
        });

        const offcanvas = document.getElementById('offcanvasNavbar');
        offcanvas.addEventListener('hidden.bs.offcanvas', function () {
            document.querySelector('.menu-icon').classList.remove('active');
        });
    </script>
</body>
</html>
