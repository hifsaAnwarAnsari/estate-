        function funShare(id) {
            // Get the specific popup element by ID
            const popup = document.getElementById(`popup${id}`);

            // Toggle the 'active' class on the popup
            popup.classList.toggle("active");

            // Close any other open popups (optional)
            document.querySelectorAll(".popupshare.active").forEach((otherPopup) => {
                if (otherPopup !== popup) {
                    otherPopup.classList.remove("active");
                }
            });
        }

       $(function () {

                var $this = $(this);

                if ($this.hasClass("active")) return;

                var direction = $this.attr("taeb-direction");

                taeb.removeClass("left right").addClass(direction);
                taeb.find(".taeb.active").removeClass("active");
                $this.addClass("active");
            });
        });
